<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<link rel="stylesheet" href="css/style.css">
  
<title>后台首页</title>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



</head>



<body>


<div class="container">


<h1>
学生管理后台
</h1>



<div class="cards">


<div class="card">

<h3>
学生总数
</h3>

<div class="num" id="total">
0
</div>

</div>



<div class="card">

<h3>
本科人数
</h3>

<div class="num" id="benke">
0
</div>

</div>



<div class="card">

<h3>
专科人数
</h3>

<div class="num" id="zhuanke">
0
</div>

</div>



<div class="card">

<h3>
今年入学
</h3>

<div class="num" id="year">
0
</div>

</div>


</div>





<h2>
最近添加学生
</h2>


<table>


<thead>

<tr>

<th>姓名</th>

<th>学校</th>

<th>专业</th>

<th>入学时间</th>

</tr>

</thead>


<tbody id="list">

</tbody>


</table>



<br>


<button onclick="location.href='students.html'">

进入学生管理

</button>



</div>






<script>


const SUPABASE_URL =
"https://ukxxmxnubxjezkwbbxdr.supabase.co";


const SUPABASE_KEY =
"sb_publishable_2IFHfms3ombozpvZCvaeEg_2VZ2z5hJ";



const db =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);






async function loadDashboard(){



let {data,error}=await db

.from("students")

.select("*");



if(error){

alert(error.message);

return;

}





// 总人数

document.getElementById("total")
.innerHTML=data.length;





// 本科

let benke =
data.filter(
s=>s.level=="本科"
).length;



document.getElementById("benke")
.innerHTML=benke;





// 专科

let zhuanke =
data.filter(
s=>s.level=="专科"
).length;



document.getElementById("zhuanke")
.innerHTML=zhuanke;






// 当前年份

let year =
new Date().getFullYear();



let count =
data.filter(
s=>s.year==year
).length;



document.getElementById("year")
.innerHTML=count;






// 最近10个


let html="";


data
.slice(-10)
.reverse()
.forEach(s=>{


html+=`

<tr>

<td>${s.name||""}</td>

<td>${s.school||""}</td>

<td>${s.major||""}</td>

<td>${s.year||""}</td>

</tr>

`;


});



document.getElementById("list")
.innerHTML=html;



}





loadDashboard();



</script>



</body>

</html>
