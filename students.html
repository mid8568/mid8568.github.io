<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>学生管理系统</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:"Microsoft YaHei";
    padding:30px;
}

table{
    border-collapse:collapse;
    width:100%;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

th{
    background:#f5f5f5;
}

</style>

</head>


<body>


<h1>学生管理系统</h1>


<table>

<thead>

<tr>

<th>编号</th>
<th>姓名</th>
<th>学校</th>
<th>专业</th>
<th>手机号</th>

</tr>

</thead>


<tbody id="studentList">

</tbody>


</table>



<script>


const supabaseUrl =
"https://ukxxmxnubxjezkwbbxdr.supabase.co";


const supabaseKey =
"sb_publishable_2IFHfms3ombozpvZCvaeEg_2VZ2z5hJ";


const db = supabase.createClient(
    supabaseUrl,
    supabaseKey
);



async function loadStudents(){


const {data,error}=await db

.from("students")

.select("*");


if(error){

console.log(error);

alert(error.message);

return;

}



let html="";


data.forEach(student=>{


html += `

<tr>

<td>${student.id}</td>

<td>${student.name}</td>

<td>${student.school}</td>

<td>${student.major}</td>

<td>${student.phone}</td>


</tr>

`;

});


document.getElementById(
"studentList"
).innerHTML=html;


}


loadStudents();


</script>


</body>
</html>
