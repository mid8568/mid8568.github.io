<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>学生管理系统</title>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>


<style>

body{

font-family:"Microsoft YaHei";

background:#f5f7fb;

margin:0;

padding:30px;

}


.container{

max-width:1200px;

margin:auto;

background:white;

padding:25px;

border-radius:12px;

}



h1{

text-align:center;

}


.toolbar{

display:flex;

gap:10px;

flex-wrap:wrap;

margin-bottom:20px;

}



input{

padding:10px;

border:1px solid #ddd;

border-radius:5px;

}



button{

padding:10px 15px;

border:0;

border-radius:5px;

background:#1677ff;

color:white;

cursor:pointer;

}


button:hover{

opacity:.8;

}


.logout{

background:#ff4d4f;

}



.edit{

background:#00a86b;

}



table{

width:100%;

border-collapse:collapse;

}



th,td{

border:1px solid #ddd;

padding:10px;

text-align:center;

}


th{

background:#f2f2f2;

}



/* 弹窗 */


.modal{

display:none;

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

background:rgba(0,0,0,.5);

}


.modal-content{

background:white;

width:400px;

margin:60px auto;

padding:20px;

border-radius:10px;

}


.modal input{

width:90%;

margin:8px;

}



</style>


</head>



<body>



<div class="container">



<h1>
学生管理系统

<button class="logout" onclick="logout()">
退出登录
</button>

</h1>



<div class="toolbar">


<input 
id="search"
placeholder="搜索姓名/学校/手机号/专业"
>


<button onclick="loadStudents()">

搜索

</button>



<button onclick="openAdd()">

+ 添加学生

</button>



<input 
type="file"
id="excelFile"
accept=".xlsx,.xls"
>


<button onclick="importExcel()">

导入Excel

</button>



</div>





<table>


<thead>


<tr>

<th>ID</th>

<th>姓名</th>

<th>学校</th>

<th>身份证</th>

<th>手机号</th>

<th>专业</th>

<th>层次</th>

<th>操作</th>


</tr>


</thead>


<tbody id="list">

</tbody>


</table>


</div>






<!-- 添加编辑 -->

<div class="modal" id="modal">


<div class="modal-content">


<h3 id="title">

添加学生

</h3>


<input id="name" placeholder="姓名">

<input id="school" placeholder="学校">

<input id="idcard" placeholder="身份证">

<input id="phone" placeholder="手机号">

<input id="major" placeholder="专业">

<input id="level" placeholder="层次">

<input id="gender" placeholder="性别">

<input id="nation" placeholder="民族">

<input id="year" placeholder="入学时间">


<br>


<button onclick="saveStudent()">

保存

</button>


<button onclick="closeModal()">

取消

</button>


</div>


</div>







<script>


//====================
// Supabase
//====================


const SUPABASE_URL =
"https://ukxxmxnubxjezkwbbxdr.supabase.co";



const SUPABASE_KEY =
"sb_publishable_2IFHfms3ombozpvZCvaeEg_2VZ2z5hJ";



const db =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);



let editId=null;



//====================
// 登录检查
//====================


async function checkLogin(){


let {data}=await db.auth.getSession();


if(!data.session){


location.href="login.html";


}


}





//====================
// 加载学生
//====================


async function loadStudents(){


let keyword=
document.getElementById("search").value;



let query=
db.from("students")
.select("*")
.order("id");



if(keyword){


query=query.or(

`name.ilike.%${keyword}%,
school.ilike.%${keyword}%,
phone.ilike.%${keyword}%,
major.ilike.%${keyword}%`

);


}



let {data,error}=await query;



if(error){

alert(error.message);

return;

}



let html="";



data.forEach(s=>{


html+=`

<tr>

<td>${s.id}</td>

<td>${s.name||""}</td>

<td>${s.school||""}</td>

<td>${s.idcard||""}</td>

<td>${s.phone||""}</td>

<td>${s.major||""}</td>

<td>${s.level||""}</td>


<td>


<button class="edit"
onclick="editStudent(${s.id})">

编辑

</button>


</td>


</tr>

`;


});



document.getElementById("list").innerHTML=html;


}







//====================
// 添加
//====================


function openAdd(){


editId=null;


document.getElementById("title").innerHTML="添加学生";


clearForm();


document.getElementById("modal").style.display="block";


}




function closeModal(){


document.getElementById("modal").style.display="none";


}



function clearForm(){


document.querySelectorAll(".modal input")
.forEach(i=>i.value="");


}







//====================
// 编辑
//====================


async function editStudent(id){


let {data,error}=await db

.from("students")

.select("*")

.eq("id",id)

.single();



if(error){

alert(error.message);

return;

}



editId=id;



document.getElementById("name").value=data.name||"";

document.getElementById("school").value=data.school||"";

document.getElementById("idcard").value=data.idcard||"";

document.getElementById("phone").value=data.phone||"";

document.getElementById("major").value=data.major||"";

document.getElementById("level").value=data.level||"";

document.getElementById("gender").value=data.gender||"";

document.getElementById("nation").value=data.nation||"";

document.getElementById("year").value=data.year||"";



document.getElementById("title").innerHTML="编辑学生";


document.getElementById("modal").style.display="block";


}








//====================
// 保存
//====================


async function saveStudent(){



let obj={


name:document.getElementById("name").value,

school:document.getElementById("school").value,

idcard:document.getElementById("idcard").value,

phone:document.getElementById("phone").value,

major:document.getElementById("major").value,

level:document.getElementById("level").value,

gender:document.getElementById("gender").value,

nation:document.getElementById("nation").value,

year:document.getElementById("year").value


};



let result;



if(editId){


result=await db

.from("students")

.update(obj)

.eq("id",editId);



}else{


result=await db

.from("students")

.insert(obj);


}



if(result.error){


alert(result.error.message);


}else{


alert("保存成功");

closeModal();

loadStudents();


}


}








//====================
// Excel导入
//====================


async function importExcel(){



let file=
document.getElementById("excelFile").files[0];



if(!file){

alert("请选择Excel文件");

return;

}



let reader=new FileReader();



reader.onload=async function(e){



let workbook=XLSX.read(

new Uint8Array(e.target.result),

{type:"array"}

);



let sheet=

workbook.Sheets[
workbook.SheetNames[0]
];



let rows=

XLSX.utils.sheet_to_json(sheet);



let list=rows.map(r=>({


school:r["学校"],

name:r["姓名"],

idcard:r["身份证号码"],

phone:r["手机号"],

gender:r["性别"],

nation:r["民族"],

level:r["层次"],

major:r["专业"],

year:r["入学时间"]


}));




let {error}=await db

.from("students")

.insert(list);



if(error){

alert(error.message);


}else{


alert(
"导入成功："+list.length+"条"
);


loadStudents();


}


};



reader.readAsArrayBuffer(file);


}







//====================
// 退出登录
//====================


async function logout(){


await db.auth.signOut();


location.href="login.html";


}






//启动


checkLogin().then(()=>{

loadStudents();

});



</script>


</body>


</html>
