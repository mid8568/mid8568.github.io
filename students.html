<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">


<h1>学生管理系统</h1>


<link rel="stylesheet" href="css/style.css">


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>


</head>



<body class="student-page">
  
<div class="nav-btn">

<button onclick="goHome()">首页</button>

</div>


<div class="container">



<h1>

学生管理系统


<button 
class="logout"
onclick="logout()">

退出登录

</button>


</h1>





<div class="toolbar">



<input
id="search"
placeholder="搜索姓名/学校/手机号/专业/性别/年份"
>



<button onclick="searchStudent()">

搜索

</button>




<button 
class="pc-only"
onclick="openAdd()">

+ 添加学生

</button>




<button onclick="openYearFilter()">

按入学时间筛选

</button>





<input

class="pc-only"

type="file"

id="excelFile"

accept=".xlsx,.xls"

>





<button 
class="pc-only"
onclick="importExcel()">

导入Excel

</button>





<button onclick="exportExcel()">

导出Excel

</button>



</div>







<!-- 表格滚动区域 -->

<div class="table-box">


<table>



<thead>


<tr>

<th>姓名</th>

<th class="pc-col">学校</th>

<th class="pc-col">身份证</th>

<th>手机号</th>

<th class="gender-col">性别</th>

<th>专业</th>

<th>层次</th>

<th class="pc-col">入学时间</th>

<th class="pc-col">操作</th>

</tr>


</thead>




<tbody id="list">


</tbody>



</table>


</div>







<div class="page">

<button onclick="prevPage()">
上一页
</button>


<span id="pageInfo">
第1页
</span>


<button onclick="nextPage()">
下一页
</button>


<span id="totalInfo">
总人数：0人
</span>

</div>



</div>









<!-- 学生详情 -->


<div class="modal" id="detailModal">


<div class="modal-content">



<h3>

学生档案

</h3>



<p>
姓名：
<span id="d_name"></span>
</p>



<p>
学校：
<span id="d_school"></span>
</p>



<p>
身份证：
<span id="d_idcard"></span>
</p>



<p>
手机号：
<span id="d_phone"></span>
</p>



<p>
性别：
<span id="d_gender"></span>
</p>



<p>
专业：
<span id="d_major"></span>
</p>



<p>
层次：
<span id="d_level"></span>
</p>



<p>
入学时间：
<span id="d_year"></span>
</p>



<button onclick="closeDetail()">

关闭

</button>



</div>


</div>









<!-- 添加编辑学生 -->


<div class="modal" id="modal">


<div class="modal-content">



<h3 id="title">

添加学生

</h3>




<input id="name" placeholder="姓名">


<input id="school" placeholder="学校">


<input id="idcard" placeholder="身份证">


<input id="phone" placeholder="手机号">


<input id="gender" placeholder="性别">


<input id="major" placeholder="专业">


<input id="level" placeholder="层次">


<input id="year" placeholder="入学时间">





<button onclick="saveStudent()">

保存

</button>




<button onclick="closeModal()">

取消

</button>



</div>


</div>









<!-- 入学年份筛选 -->


<div class="modal" id="yearModal">


<div class="modal-content">



<h3>

选择入学时间

</h3>




<div id="yearList">


</div>





<br>



<button onclick="closeYearFilter()">

关闭

</button>




</div>


</div>









<script src="js/script.js"></script>



</body>


</html>
