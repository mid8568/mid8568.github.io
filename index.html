<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>学生管理系统</title>


<link rel="stylesheet" href="css/style.css">


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


</head>


<body>


<header>

<h2>
学生管理系统
</h2>

</header>



<div class="search-box">


<input 
id="search"
placeholder="搜索姓名/学校/手机号">


<button onclick="searchStudent()">
搜索
</button>


</div>



<div class="actions">


<button onclick="openAdd()">

➕ 添加学生

</button>



<button onclick="openYearFilter()">

📅 入学时间

</button>


</div>





<div id="list">


</div>





<!-- 添加学生 -->

<div class="modal" id="modal">


<div class="box">


<h3>
添加学生
</h3>


<input id="name" placeholder="姓名">

<input id="school" placeholder="学校">

<input id="phone" placeholder="手机号">

<input id="major" placeholder="专业">

<input id="level" placeholder="层次">

<input id="year" placeholder="入学时间">



<button onclick="saveStudent()">

保存

</button>


<button onclick="closeModal()">

取消

</button>



</div>


</div>




<script src="app.js"></script>


</body>

</html>
